services:
  - type: web
    name: legalrag
    env: docker
    port: 3000
    region: ohio
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will manually enter this in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Recommended free demo embedding provider
      - key: OPENAI_API_KEY
        sync: false # Optional: enables OpenAI embeddings for better retrieval
      - key: EMBEDDING_PROVIDER
        value: local
